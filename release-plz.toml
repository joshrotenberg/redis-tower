# Configuration for release-plz
# https://release-plz.ieni.dev/docs/config

[workspace]
# Changelog configuration
changelog_update = true
changelog_path = "CHANGELOG.md"
changelog_config = "cliff.toml"

# Git configuration
git_release_enable = true
git_tag_enable = true
git_tag_name = "v{{ version }}"

# Release configuration
publish_allow_dirty = false
publish_no_verify = false

# Features to enable during release
features = ["cluster", "sentinel", "bloom"]

[[package]]
name = "redis-tower"

# Changelog configuration for this package
changelog_include = [
    "feat",
    "fix",
    "perf",
    "refactor",
    "docs",
]

# Version increment rules
# Use conventional commits to determine version bumps:
# - feat: minor version bump
# - fix: patch version bump
# - BREAKING CHANGE: major version bump
semver_check = true
