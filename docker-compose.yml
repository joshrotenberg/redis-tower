version: "3.8"

services:
  # Standalone Redis for basic examples
  redis-standalone:
    image: redis:7.2-alpine
    container_name: redis-standalone
    ports:
      - "6379:6379"
    command: redis-server
    networks:
      - redis-net

  # Redis Cluster Setup (3 masters + 3 replicas)
  # Cluster spans slots 0-16383 across 3 master nodes

  redis-cluster-1:
    image: redis:7.2-alpine
    container_name: redis-cluster-1
    profiles: ["cluster"]
    ports:
      - "7100:7100"
      - "17100:17100"
    command: >
      redis-server
      --port 7100
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7100
      --cluster-announce-bus-port 17100
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7100
      --cluster-announce-bus-port 17100
      --appendonly yes
      --protected-mode no
    networks:
      - redis-net
    volumes:
      - redis-cluster-1-data:/data

  redis-cluster-2:
    profiles: ["cluster"]
    image: redis:7.2-alpine
    container_name: redis-cluster-2
    ports:
      - "7101:7101"
      - "17101:17101"
    command: >
      redis-server
      --port 7101
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7101
      --cluster-announce-bus-port 17101
      --appendonly yes
      --protected-mode no
    networks:
      - redis-net
    volumes:
      - redis-cluster-2-data:/data

  redis-cluster-3:
    profiles: ["cluster"]
    image: redis:7.2-alpine
    container_name: redis-cluster-3
    ports:
      - "7102:7102"
      - "17102:17102"
    command: >
      redis-server
      --port 7102
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7102
      --cluster-announce-bus-port 17102
      --appendonly yes
      --protected-mode no
    networks:
      - redis-net
    volumes:
      - redis-cluster-3-data:/data

  redis-cluster-4:
    profiles: ["cluster"]
    image: redis:7.2-alpine
    container_name: redis-cluster-4
    ports:
      - "7103:7103"
      - "17103:17103"
    command: >
      redis-server
      --port 7103
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7103
      --cluster-announce-bus-port 17103
      --appendonly yes
      --protected-mode no
    networks:
      - redis-net
    volumes:
      - redis-cluster-4-data:/data

  redis-cluster-5:
    profiles: ["cluster"]
    image: redis:7.2-alpine
    container_name: redis-cluster-5
    ports:
      - "7104:7104"
      - "17104:17104"
    command: >
      redis-server
      --port 7104
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7104
      --cluster-announce-bus-port 17104
      --appendonly yes
      --protected-mode no
    networks:
      - redis-net
    volumes:
      - redis-cluster-5-data:/data

  redis-cluster-6:
    profiles: ["cluster"]
    image: redis:7.2-alpine
    container_name: redis-cluster-6
    ports:
      - "7105:7105"
      - "17105:17105"
    command: >
      redis-server
      --port 7105
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip 127.0.0.1
      --cluster-announce-port 7105
      --cluster-announce-bus-port 17105
      --appendonly yes
      --protected-mode no
    networks:
      - redis-net
    volumes:
      - redis-cluster-6-data:/data

  # Redis Sentinel Setup (1 master + 2 replicas + 3 sentinels)
  # Master on port 6380, replicas on 6381-6382, sentinels on 26379-26381

  redis-sentinel-master:
    profiles: ["sentinel"]
    image: redis:7.2-alpine
    container_name: redis-sentinel-master
    ports:
      - "6380:6380"
    command: >
      redis-server
      --port 6380
      --protected-mode no
    networks:
      - redis-net
    volumes:
      - redis-sentinel-master-data:/data

  redis-sentinel-replica-1:
    profiles: ["sentinel"]
    image: redis:7.2-alpine
    container_name: redis-sentinel-replica-1
    ports:
      - "6381:6381"
    command: >
      redis-server
      --port 6381
      --replicaof redis-sentinel-master 6380
      --protected-mode no
    depends_on:
      - redis-sentinel-master
    networks:
      - redis-net
    volumes:
      - redis-sentinel-replica-1-data:/data

  redis-sentinel-replica-2:
    profiles: ["sentinel"]
    image: redis:7.2-alpine
    container_name: redis-sentinel-replica-2
    ports:
      - "6382:6382"
    command: >
      redis-server
      --port 6382
      --replicaof redis-sentinel-master 6380
      --protected-mode no
    depends_on:
      - redis-sentinel-master
    networks:
      - redis-net
    volumes:
      - redis-sentinel-replica-2-data:/data

  sentinel-1:
    profiles: ["sentinel"]
    image: redis:7.2-alpine
    container_name: sentinel-1
    ports:
      - "26379:26379"
    depends_on:
      - redis-sentinel-master
      - redis-sentinel-replica-1
      - redis-sentinel-replica-2
    networks:
      - redis-net
    command:
      - sh
      - -c
      - |
        echo "port 26379" > /tmp/sentinel.conf
        echo "sentinel monitor mymaster redis-sentinel-master 6380 2" >> /tmp/sentinel.conf
        echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf
        echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf
        echo "sentinel failover-timeout mymaster 10000" >> /tmp/sentinel.conf
        echo "protected-mode no" >> /tmp/sentinel.conf
        redis-sentinel /tmp/sentinel.conf

  sentinel-2:
    profiles: ["sentinel"]
    image: redis:7.2-alpine
    container_name: sentinel-2
    ports:
      - "26380:26380"
    depends_on:
      - redis-sentinel-master
      - redis-sentinel-replica-1
      - redis-sentinel-replica-2
    networks:
      - redis-net
    command:
      - sh
      - -c
      - |
        echo "port 26380" > /tmp/sentinel.conf
        echo "sentinel monitor mymaster redis-sentinel-master 6380 2" >> /tmp/sentinel.conf
        echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf
        echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf
        echo "sentinel failover-timeout mymaster 10000" >> /tmp/sentinel.conf
        echo "protected-mode no" >> /tmp/sentinel.conf
        redis-sentinel /tmp/sentinel.conf

  sentinel-3:
    profiles: ["sentinel"]
    image: redis:7.2-alpine
    container_name: sentinel-3
    ports:
      - "26381:26381"
    depends_on:
      - redis-sentinel-master
      - redis-sentinel-replica-1
      - redis-sentinel-replica-2
    networks:
      - redis-net
    command:
      - sh
      - -c
      - |
        echo "port 26381" > /tmp/sentinel.conf
        echo "sentinel monitor mymaster redis-sentinel-master 6380 2" >> /tmp/sentinel.conf
        echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf
        echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf
        echo "sentinel failover-timeout mymaster 10000" >> /tmp/sentinel.conf
        echo "protected-mode no" >> /tmp/sentinel.conf
        redis-sentinel /tmp/sentinel.conf

  # Cluster initialization service
  # This creates the cluster once all nodes are ready
  cluster-init:
    image: redis:7.2-alpine
    container_name: cluster-init
    profiles: ["cluster"]
    depends_on:
      - redis-cluster-1
      - redis-cluster-2
      - redis-cluster-3
      - redis-cluster-4
      - redis-cluster-5
      - redis-cluster-6
    networks:
      - redis-net
    command:
      - sh
      - -c
      - |
        echo 'Waiting for Redis nodes to start...'
        sleep 10
        echo 'Creating Redis cluster...'
        redis-cli --cluster create \
          redis-cluster-1:7100 \
          redis-cluster-2:7101 \
          redis-cluster-3:7102 \
          redis-cluster-4:7103 \
          redis-cluster-5:7104 \
          redis-cluster-6:7105 \
          --cluster-replicas 1 \
          --cluster-yes
        echo 'Redis cluster created successfully!'
        echo 'Cluster info:'
        redis-cli -h redis-cluster-1 -p 7100 cluster info
        echo 'Cluster nodes:'
        redis-cli -h redis-cluster-1 -p 7100 cluster nodes
    restart: "no"

networks:
  redis-net:
    driver: bridge

volumes:
  redis-cluster-1-data:
  redis-cluster-2-data:
  redis-cluster-3-data:
  redis-cluster-4-data:
  redis-cluster-5-data:
  redis-cluster-6-data:
  redis-sentinel-master-data:
  redis-sentinel-replica-1-data:
  redis-sentinel-replica-2-data:
