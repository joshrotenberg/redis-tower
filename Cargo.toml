[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[profile.bench]
inherits = "release"

[features]
default = []
# Deployment topology support (feature-gated)
cluster = []          # Redis Cluster support
sentinel = []         # Redis Sentinel support
# TLS support (feature-gated)
tls-native-tls = ["dep:native-tls", "dep:tokio-native-tls"]
tls-rustls = ["dep:rustls", "dep:tokio-rustls", "rustls/std", "dep:rustls-native-certs"]
tls-rustls-ring = ["tls-rustls", "rustls/ring"]
tls-rustls-webpki = ["tls-rustls", "dep:webpki-roots"]
# Serde JSON integration (feature-gated)
serde-json = ["dep:serde_json"]  # JSON serialization for Rust structs
# Backwards compatibility (feature-gated)
deprecated = []       # Include deprecated commands (GETSET, RPOPLPUSH, GEORADIUS, etc.)
# Redis module support (feature-gated)
modules = []
bloom = ["modules"]
json = ["modules"]
search = ["modules"]
timeseries = ["modules"]
graph = ["modules"]
