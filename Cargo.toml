[package]
name = "redis-tower"
version = "0.1.0"
# Rust 2024 edition (requires Rust 1.85+, released Feb 2025)
edition = "2024"
authors = ["Josh Rotenberg <joshrotenberg@gmail.com>"]
description = "A Tower-based Redis client with strong typing, composable middleware, and 200+ commands"
license = "MIT OR Apache-2.0"
repository = "https://github.com/joshrotenberg/redis-tower"
documentation = "https://docs.rs/redis-tower"
homepage = "https://github.com/joshrotenberg/redis-tower"
readme = "README.md"
keywords = ["redis", "tower", "async", "client", "database"]
categories = ["database", "asynchronous", "network-programming"]
# MSRV: Rust 1.87 (for `usize::is_multiple_of` stabilized in 1.86, plus safety margin)
rust-version = "1.87"
exclude = [
    "docs/",
    ".github/",
    "benches/",
    "examples/",
]

[dependencies]
# Tower ecosystem
tower = { version = "0.5", features = ["make", "reconnect", "timeout", "balance", "buffer", "util"] }
tower-layer = "0.3"
tower-service = "0.3"

# Async runtime
tokio = { version = "1.42", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
tokio-stream = "0.1"

# Core utilities
bytes = "1.9"
futures = "0.3"
thiserror = "2.0"
anyhow = "1.0"
memchr = "2.7"
socket2 = "0.5"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", optional = true }

# Cryptography
sha1 = "0.10"

# Logging and tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower-resilience = { version = "0.3.7", features = ["full"] }

# TLS support (optional)
native-tls = { version = "0.2", optional = true }
tokio-native-tls = { version = "0.3", optional = true }
rustls = { version = "0.23", optional = true, default-features = false }
tokio-rustls = { version = "0.26", optional = true, default-features = false }
rustls-native-certs = { version = "0.8", optional = true }
webpki-roots = { version = "0.26", optional = true }
tower-resilience-healthcheck = "0.1.0"

# Protocol parser now integrated as internal module

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports", "async_tokio"] }
tokio-test = "0.4"
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }
fred = { version = "9.3", features = ["i-all"] }
proptest = "1.6"
docker-wrapper = { path = "/tmp/docker-wrapper", features = ["template-redis-cluster", "template-redis-sentinel"] }

[[bench]]
name = "comparison"
harness = false

# Cluster-specific examples
[[example]]
name = "cluster_with_tower"
required-features = ["cluster"]

[[example]]
name = "pipeline_cluster"
required-features = ["cluster"]

[[example]]
name = "cluster_read_from_replica"
