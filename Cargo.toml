[package]
name = "redis-tower"
version = "0.1.0"
# Rust 2024 edition (requires Rust 1.85+, released Feb 2025)
edition = "2024"
authors = ["Josh Rotenberg <joshrotenberg@gmail.com>"]
description = "A Tower-based Redis client with strong typing, composable middleware, and 200+ commands"
license = "MIT OR Apache-2.0"
repository = "https://github.com/joshrotenberg/redis-tower"
documentation = "https://docs.rs/redis-tower"
homepage = "https://github.com/joshrotenberg/redis-tower"
readme = "README.md"
keywords = ["redis", "tower", "async", "client", "database"]
categories = ["database", "asynchronous", "network-programming"]
# MSRV: Rust 1.87 (for `usize::is_multiple_of` stabilized in 1.86, plus safety margin)
rust-version = "1.87"
exclude = [
    "docs/",
    ".github/",
    "benches/",
    "examples/",
]

[dependencies]
# Tower ecosystem
tower = { version = "0.5", features = ["make", "reconnect", "timeout", "balance", "buffer", "util"] }
tower-layer = "0.3"
tower-service = "0.3"

# Async runtime
tokio = { version = "1.42", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
tokio-stream = "0.1"

# Core utilities
bytes = "1.9"
futures = "0.3"
thiserror = "2.0"
anyhow = "1.0"
memchr = "2.7"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptography
sha1 = "0.10"

# Logging and tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower-resilience = { path = "tmp/tower-resilience/crates/tower-resilience", features = ["full"] }

# TLS support (optional)
native-tls = { version = "0.2", optional = true }
tokio-native-tls = { version = "0.3", optional = true }
rustls = { version = "0.23", optional = true, default-features = false }
tokio-rustls = { version = "0.26", optional = true, default-features = false }
rustls-native-certs = { version = "0.8", optional = true }
webpki-roots = { version = "0.26", optional = true }

# Protocol parser now integrated as internal module

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports", "async_tokio"] }
tokio-test = "0.4"
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }
fred = { version = "9.3", features = ["i-all"] }
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["redis"] }
proptest = "1.6"

[[bench]]
name = "comparison"
harness = false

# Cluster-specific examples
[[example]]
name = "cluster_with_tower"
required-features = ["cluster"]

[[example]]
name = "pipeline_cluster"
required-features = ["cluster"]

[[example]]
name = "cluster_read_from_replica"
required-features = ["cluster"]

# Sentinel-specific examples
[[example]]
name = "sentinel_basic"
required-features = ["sentinel"]

# Cluster-specific tests
[[test]]
name = "test_cluster"
path = "tests/commands/test_cluster.rs"
required-features = ["cluster"]

[[test]]
name = "test_cluster_simple"
path = "tests/commands/test_cluster_simple.rs"
required-features = ["cluster"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[profile.bench]
inherits = "release"

[features]
default = []
# Deployment topology support (feature-gated)
cluster = []          # Redis Cluster support
sentinel = []         # Redis Sentinel support
# TLS support (feature-gated)
tls-native-tls = ["dep:native-tls", "dep:tokio-native-tls"]
tls-rustls = ["dep:rustls", "dep:tokio-rustls", "rustls/std", "dep:rustls-native-certs"]
tls-rustls-ring = ["tls-rustls", "rustls/ring"]
tls-rustls-webpki = ["tls-rustls", "dep:webpki-roots"]
# Backwards compatibility (feature-gated)
deprecated = []       # Include deprecated commands (GETSET, RPOPLPUSH, GEORADIUS, etc.)
# Redis module support (feature-gated)
modules = []
bloom = ["modules"]
json = ["modules"]
search = ["modules"]
timeseries = ["modules"]
graph = ["modules"]
