[package]
name = "redis-tower"
version = "0.1.0"
edition = "2024"
authors = ["Josh Rotenberg"]
description = "Experimental Tower-based Redis client with strong typing"
license = "MIT OR Apache-2.0"

[dependencies]
# Tower ecosystem
tower = { version = "0.5", features = ["make", "reconnect", "timeout", "balance", "buffer", "util"] }
tower-layer = "0.3"
tower-service = "0.3"

# Async runtime
tokio = { version = "1.42", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
tokio-stream = "0.1"

# Core utilities
bytes = "1.9"
futures = "0.3"
thiserror = "2.0"
anyhow = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptography
sha1 = "0.10"

# Logging and tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower-resilience = { version = "0.3.5", features = ["full"] }
resp-parser = { version = "0.1.0", path = "../resp-parser-rs" }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports", "async_tokio"] }
tokio-test = "0.4"
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }
fred = { version = "9.3", features = ["i-all"] }

[[bench]]
name = "comparison"
harness = false

# Cluster-specific examples
[[example]]
name = "cluster_with_tower"
required-features = ["cluster"]

[[example]]
name = "pipeline_cluster"
required-features = ["cluster"]

[[example]]
name = "cluster_read_from_replica"
required-features = ["cluster"]

# Sentinel-specific examples
[[example]]
name = "sentinel_basic"
required-features = ["sentinel"]

# Cluster-specific tests
[[test]]
name = "test_cluster"
required-features = ["cluster"]

[[test]]
name = "test_cluster_simple"
required-features = ["cluster"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[profile.bench]
inherits = "release"

[features]
default = []
# Deployment topology support (feature-gated)
cluster = []          # Redis Cluster support
sentinel = []         # Redis Sentinel support
# Backwards compatibility (feature-gated)
deprecated = []       # Include deprecated commands (GETSET, RPOPLPUSH, GEORADIUS, etc.)
# Redis module support (feature-gated)
modules = []
bloom = ["modules"]
json = ["modules"]
search = ["modules"]
timeseries = ["modules"]
graph = ["modules"]
