[package]
name = "redis-tower"
version = "0.1.0"
edition = "2024"
authors = ["Josh Rotenberg"]
description = "Experimental Tower-based Redis client with strong typing"
license = "MIT OR Apache-2.0"

[dependencies]
# Tower ecosystem
tower = { version = "0.5", features = ["make", "reconnect", "timeout", "balance", "buffer", "util"] }
tower-layer = "0.3"
tower-service = "0.3"

# Async runtime
tokio = { version = "1.42", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
tokio-stream = "0.1"

# Core utilities
bytes = "1.9"
futures = "0.3"
thiserror = "2.0"
anyhow = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptography
sha1 = "0.10"

# Logging and tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower-resilience = { version = "0.3.5", features = ["full"] }
resp-parser = { version = "0.1.0", path = "../resp-parser-rs" }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports", "async_tokio"] }
tokio-test = "0.4"
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }
fred = { version = "9.3", features = ["i-all"] }

[[bench]]
name = "comparison"
harness = false

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[profile.bench]
inherits = "release"
