name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.rust }}

      - name: Run unit tests
        run: cargo test --lib --all-features

      - name: Run doc tests
        run: cargo test --doc --all-features

  test-integration:
    name: Integration Tests (Redis ${{ matrix.redis }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        redis: ["7.4.3", "8.0.6"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Redis build
        uses: actions/cache@v4
        with:
          path: ~/redis
          key: redis-${{ matrix.redis }}-${{ runner.os }}

      - name: Build Redis ${{ matrix.redis }}
        run: |
          if [ ! -f ~/redis/bin/redis-server ]; then
            cd /tmp
            curl -fsSL https://github.com/redis/redis/archive/refs/tags/${{ matrix.redis }}.tar.gz | tar xz
            cd redis-${{ matrix.redis }}
            make -j$(nproc)
            mkdir -p ~/redis/bin
            cp src/redis-server src/redis-cli ~/redis/bin/
          fi
          echo "$HOME/redis/bin" >> $GITHUB_PATH
          redis-server --version || ~/redis/bin/redis-server --version

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: integration-redis-${{ matrix.redis }}

      - name: Run standalone integration tests
        run: cargo test -p redis-tower --test integration --all-features

      - name: Run cluster integration tests
        run: cargo test -p redis-tower-cluster --test cluster_integration --all-features -- --ignored --test-threads=1

      - name: Run sentinel integration tests
        run: cargo test -p redis-tower-sentinel --test sentinel_integration --all-features -- --ignored --test-threads=1

  features:
    name: Feature Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check no-default-features
        run: cargo check -p redis-tower --no-default-features
      - name: Check individual features
        run: |
          cargo check -p redis-tower-commands --no-default-features
          cargo check -p redis-tower-commands --no-default-features --features json
          cargo check -p redis-tower-commands --no-default-features --features search
          cargo check -p redis-tower-commands --no-default-features --features bloom
          cargo check -p redis-tower --no-default-features --features serde

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv

      - name: Check MSRV
        run: cargo check --workspace --all-features
