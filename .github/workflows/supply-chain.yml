name: Supply chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so newly-disclosed advisories surface even without a code change.
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo-deny (advisories, licenses, bans, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Cargo.lock is not committed, so resolve a fresh tree first; this audits
      # the latest semver-compatible dependencies, matching what users get.
      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Run cargo-audit
        run: cargo audit
